const { useState, useEffect } = React;

const DAY_TYPES = [
  { id: "rest",          label: "Rest Day",            emoji: "😴", target: 3000, seeking: 1, bulk: 0, note: "Baseline maintenance" },
  { id: "strength",      label: "Strength Training",   emoji: "🏋️", target: 3500, seeking: 2, bulk: 0, note: "A/C gym — moderate sweat" },
  { id: "hiit",          label: "Norwegian 4x4 HIIT",  emoji: "🔥", target: 4000, seeking: 2, bulk: 0, note: "High intensity — front-load before session" },
  { id: "walk_golf",     label: "Walking Golf",         emoji: "⛳", target: 4750, seeking: 2, bulk: 0, note: "4+ hrs outdoors — start hydrated night before" },
  { id: "cart_golf",     label: "Cart Golf + Beers",   emoji: "🍺", target: 5000, seeking: 2, bulk: 0, note: "+250ml water per standard drink", beerMode: true },
  { id: "gym_cart_golf", label: "Gym + Cart Golf",     emoji: "🏋️⛳", target: 5250, seeking: 2, bulk: 1, note: "Double session — gym then golf. Front-load electrolytes." },
  { id: "bike",          label: "Bike + Training",      emoji: "🚴", target: 4250, seeking: 2, bulk: 1, note: "Double activity — highest electrolyte day" },
  { id: "ruck",          label: "Ruck",                 emoji: "🎒", target: 5250, seeking: 2, bulk: 1, note: "Weighted outdoor carry — peak sweat demand" },
];

const INCREMENT        = 450;
const MAX_SESSION      = 4;
const MAX_WEEK         = 10;
const CUTOFF_HOUR      = 20;
const CIG_PLAN         = [2, 1.5, 1, 0.5, 0];
const CAFF_SOURCES     = [
  { id: "espresso",   label: "Espresso / Coffee", emoji: "☕", mg: 80,  mag: 0,  sodium: 0,  potassium: 0   },
  { id: "preworkout", label: "Pre-workout",        emoji: "💪", mg: 200, mag: 50, sodium: 50, potassium: 100 },
  { id: "energy",     label: "Energy Drink",       emoji: "⚡", mg: 150, mag: 0,  sodium: 0,  potassium: 0   },
  { id: "tea",        label: "Tea",                emoji: "🍵", mg: 40,  mag: 0,  sodium: 0,  potassium: 0   },
];
const CAFF_SOFT_LIMIT  = 400;
const CAFF_CUTOFF_HOUR = 13;
const ELEC_COLOR  = "#c084fc";
const BULK_COLOR  = "#fb923c";
const DRINK_COLOR = "#f472b6";
const CIG_COLOR   = "#fbbf24";
const CAFF_COLOR  = "#4ade80";

const formatMl = ml => ml >= 1000 ? `${(ml/1000).toFixed(1)}L` : `${ml}ml`;
const getStatusColor = pct => { if(pct>=100)return"#00e5a0"; if(pct>=60)return"#4fc3f7"; if(pct>=30)return"#ffd54f"; return"#ef5350"; };
const getUrineStatus = pct => { if(pct>=100)return{label:"Well hydrated 💪",color:"#00e5a0"}; if(pct>=60)return{label:"Getting there 👍",color:"#4fc3f7"}; if(pct>=30)return{label:"Drink up 🚰",color:"#ffd54f"}; return{label:"Dehydrated! 🚨",color:"#ef5350"}; };
const getWeekKey = () => { const d=new Date(); const j=new Date(d.getFullYear(),0,1); const w=Math.ceil(((d-j)/86400000+j.getDay()+1)/7); return `${d.getFullYear()}-W${w}`; };
const getAppWeek = s => { if(!s)return 0; const diff=Math.floor((new Date()-new Date(s))/86400000); return Math.min(Math.floor(diff/7),CIG_PLAN.length-1); };

function App() {
  const today   = new Date().toDateString();
  const weekKey = getWeekKey();
  const ld  = (k,d) => { try{const v=localStorage.getItem(`${k}_${today}`);return v!==null?JSON.parse(v):d;}catch{return d;} };
  const sd  = (k,v) => { try{localStorage.setItem(`${k}_${today}`,JSON.stringify(v));}catch{} };
  const ldw = (k,d) => { try{const v=localStorage.getItem(`${k}_${weekKey}`);return v!==null?JSON.parse(v):d;}catch{return d;} };
  const sdw = (k,v) => { try{localStorage.setItem(`${k}_${weekKey}`,JSON.stringify(v));}catch{} };
  const ldg = (k,d) => { try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):d;}catch{return d;} };
  const sdg = (k,v) => { try{localStorage.setItem(k,JSON.stringify(v));}catch{} };

  const [intake,        setIntake]        = useState(()=>ld("water",0));
  const [seekingScoops, setSeekingScoops] = useState(()=>ld("seeking",0));
  const [bulkScoops,    setBulkScoops]    = useState(()=>ld("bulk",0));
  const [saltScoops,    setSaltScoops]    = useState(()=>ld("salts",0));
  const [dayTypeId,     setDayTypeId]     = useState(()=>ld("daytype","rest"));
  const [sessionDrinks, setSessionDrinks] = useState(()=>ld("sessionDrinks",0));
  const [weekDrinks,    setWeekDrinks]    = useState(()=>ldw("weekDrinks",0));
  const [cigToday,      setCigToday]      = useState(()=>ld("cigs",0));
  const [cigStartDate,  setCigStartDate]  = useState(()=>ldg("cigStartDate",new Date().toISOString().slice(0,10)));
  const [caffLog,       setCaffLog]       = useState(()=>ld("caffLog",[]));
  const [suppOmega,     setSuppOmega]     = useState(()=>ld("suppOmega",false));
  const [suppTheanineAM,setSuppTheanineAM]= useState(()=>ld("suppTheanineAM",false));
  const [suppTheaninePM,setSuppTheaninePM]= useState(()=>ld("suppTheaninePM",false));
  const [suppVitB,      setSuppVitB]      = useState(()=>ld("suppVitB",false));
  const [suppMagDose,   setSuppMagDose]   = useState(()=>ld("suppMagDose",0));
  const [suppCreatine,  setSuppCreatine]  = useState(()=>ld("suppCreatine",false));
  const [ripple,        setRipple]        = useState(false);
  const [showSelector,  setShowSelector]  = useState(false);
  const [activeTab,     setActiveTab]     = useState("water");
  const [drinkWarning,  setDrinkWarning]  = useState("");
  const [now,           setNow]           = useState(new Date());

  useEffect(()=>{const t=setInterval(()=>setNow(new Date()),60000);return()=>clearInterval(t);},[]);
  useEffect(()=>sd("water",intake),[intake]);
  useEffect(()=>sd("seeking",seekingScoops),[seekingScoops]);
  useEffect(()=>sd("bulk",bulkScoops),[bulkScoops]);
  useEffect(()=>sd("salts",saltScoops),[saltScoops]);
  useEffect(()=>sd("daytype",dayTypeId),[dayTypeId]);
  useEffect(()=>sd("sessionDrinks",sessionDrinks),[sessionDrinks]);
  useEffect(()=>sdw("weekDrinks",weekDrinks),[weekDrinks]);
  useEffect(()=>sd("cigs",cigToday),[cigToday]);
  useEffect(()=>sdg("cigStartDate",cigStartDate),[cigStartDate]);
  useEffect(()=>sd("caffLog",caffLog),[caffLog]);
  useEffect(()=>sd("suppOmega",suppOmega),[suppOmega]);
  useEffect(()=>sd("suppTheanineAM",suppTheanineAM),[suppTheanineAM]);
  useEffect(()=>sd("suppTheaninePM",suppTheaninePM),[suppTheaninePM]);
  useEffect(()=>sd("suppVitB",suppVitB),[suppVitB]);
  useEffect(()=>sd("suppMagDose",suppMagDose),[suppMagDose]);
  useEffect(()=>sd("suppCreatine",suppCreatine),[suppCreatine]);
  useEffect(()=>{if(!drinkWarning)return;const t=setTimeout(()=>setDrinkWarning(""),3500);return()=>clearTimeout(t);},[drinkWarning]);

  const dayType  = DAY_TYPES.find(d=>d.id===dayTypeId)||DAY_TYPES[0];
  const target   = dayType.target+(sessionDrinks*250);
  const pct      = Math.min((intake/target)*100,100);
  const status   = getUrineStatus(pct);
  const remaining= Math.max(target-intake,0);
  const cups     = Math.ceil(remaining/INCREMENT);
  const waveY    = 100-pct;
  const appWeek  = getAppWeek(cigStartDate);
  const cigDailyGoal = CIG_PLAN[appWeek]??0;
  const cigPct   = cigDailyGoal>0?Math.min((cigToday/cigDailyGoal)*100,120):(cigToday>0?100:0);
  const cigOver  = cigToday>cigDailyGoal;
  const cigDone  = cigDailyGoal===0;
  const isPastCutoff  = now.getHours()>=CUTOFF_HOUR;
  const minsUntilCut  = isPastCutoff?0:(CUTOFF_HOUR-now.getHours())*60-now.getMinutes();
  const weekLeft      = Math.max(MAX_WEEK-weekDrinks,0);
  const drinkBlocked  = isPastCutoff||sessionDrinks>=MAX_SESSION||weekDrinks>=MAX_WEEK;
  const totalMg       = caffLog.reduce((s,e)=>s+e.mg,0);
  const caffServings  = caffLog.length;
  const caffPct       = Math.min((totalMg/CAFF_SOFT_LIMIT)*100,110);
  const isPastCaffCutoff = now.getHours()>=CAFF_CUTOFF_HOUR;
  const minsUntilCaffCut = isPastCaffCutoff?0:(CAFF_CUTOFF_HOUR-now.getHours())*60-now.getMinutes();
  const caffOver      = totalMg>CAFF_SOFT_LIMIT;
  const preWorkoutScoops = caffLog.filter(e=>e.sourceId==="preworkout").length;
  const pwMag=preWorkoutScoops*50, pwSodium=preWorkoutScoops*50, pwPotassium=preWorkoutScoops*100;

  const addWater = () => { setIntake(v=>v+INCREMENT); setRipple(true); setTimeout(()=>setRipple(false),600); };
  const addDrink = (amount=1) => {
    if(isPastCutoff){setDrinkWarning("⏰ It's past 8pm — no more drinks tonight!");return;}
    if(sessionDrinks>=MAX_SESSION){setDrinkWarning(`🚫 ${MAX_SESSION} std drink session limit reached.`);return;}
    if(weekDrinks>=MAX_WEEK){setDrinkWarning(`🚫 ${MAX_WEEK} std drink weekly limit reached.`);return;}
    setSessionDrinks(v=>Math.round((v+amount)*10)/10);
    setWeekDrinks(v=>Math.round((v+amount)*10)/10);
    setIntake(v=>v+Math.round(250*amount));
    setDrinkWarning("");
  };
  const removeDrink = () => {
    if(sessionDrinks<=0)return;
    const remove=sessionDrinks>=1?1:sessionDrinks;
    setSessionDrinks(v=>Math.round(Math.max(0,v-remove)*10)/10);
    setWeekDrinks(v=>Math.round(Math.max(0,v-remove)*10)/10);
    setIntake(v=>Math.max(0,v-Math.round(250*remove)));
  };
  const reset = () => {
    if(confirm("Reset all of today's tracking?")){
      setIntake(0);setSeekingScoops(0);setBulkScoops(0);setSaltScoops(0);
      setSessionDrinks(0);setCigToday(0);setCaffLog([]);
      setSuppOmega(false);setSuppTheanineAM(false);setSuppTheaninePM(false);
      setSuppVitB(false);setSuppMagDose(0);setSuppCreatine(false);
    }
  };

  const tabs=[
    {id:"water",label:"💧",title:"Water"},
    {id:"electrolytes",label:"⚡",title:"Electro"},
    {id:"drinks",label:"🍻",title:"Drinks"},
    {id:"smokes",label:"🚬",title:"Smokes"},
    {id:"caffeine",label:"☕",title:"Caffeine"},
    {id:"supps",label:"💊",title:"Supps"},
  ];

  return (
    <div style={{minHeight:"100vh",minHeight:"100dvh",background:"linear-gradient(160deg,#0a1628 0%,#0d2137 55%,#091a2e 100%)",fontFamily:"'Georgia','Times New Roman',serif",display:"flex",flexDirection:"column",alignItems:"center",padding:"env(safe-area-inset-top,18px) 14px 52px",color:"#e0f0ff"}}>
      <style>{`
        @keyframes ripple{0%{transform:translate(-50%,-50%) scale(1);opacity:.8}100%{transform:translate(-50%,-50%) scale(1.5);opacity:0}}
        @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
        @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
        .btn-press:active{transform:scale(0.93)!important}
        .tab-btn{transition:all 0.2s}
        button{-webkit-tap-highlight-color:transparent}
      `}</style>
